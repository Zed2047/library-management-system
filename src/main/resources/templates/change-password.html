<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common-head :: head('修改密码')}"></head>
<body class="d-flex">

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="content-area flex-grow-1">
    <th:block th:replace="~{fragments/header :: header('修改密码')}"></th:block>

    <section class="container-fluid py-4 px-3 px-md-4">
        <div class="row justify-content-center">
            <div class="col-lg-5">

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

                <div class="card">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-4" style="color:#37352F;">修改密码</h5>
                        <form method="post" th:action="@{/user/change-password}">
                            <div class="mb-3">
                                <label class="form-label text-muted">旧密码</label>
                                <input type="password" name="oldPassword" class="form-control" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">新密码</label>
                                <input type="password" name="newPassword" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">确认新密码</label>
                                <input type="password" name="confirmPassword" class="form-control" required>
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-notion">
                                    <i class="bi bi-check-lg"></i> 确认修改
                                </button>
                                <a th:href="@{/home}" class="btn btn-outline-secondary">取消</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </section>
</main>

<th:block th:replace="~{fragments/common-scripts :: scripts}"></th:block>
</body>
</html>
