<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:fragment="scripts">
    const COLLAPSED = 'sidebar-collapsed';
    const toggleBtn = document.getElementById('sidebarToggle');
    const toggleIcon = document.getElementById('sidebarToggleIcon');
    const menuLinks = document.querySelectorAll('.sidebar-menu .nav-link');

    const syncIcon = () => {
        toggleIcon.className = document.body.classList.contains(COLLAPSED)
            ? 'bi bi-layout-sidebar'
            : 'bi bi-layout-sidebar-inset';
    };

    if (localStorage.getItem(COLLAPSED) === '1') document.body.classList.add(COLLAPSED);
    syncIcon();

    toggleBtn.addEventListener('click', () => {
        const collapsed = document.body.classList.toggle(COLLAPSED);
        localStorage.setItem(COLLAPSED, +collapsed);
        syncIcon();
    });

    // Active link highlight
    const currentPath = location.pathname;

    menuLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href && currentPath.startsWith(href)) {
            link.classList.add('active');
            link.setAttribute('aria-current', 'page');
        }
    });

    // Star rating widget
    const starRating = document.getElementById('starRating');
    if (starRating) {
        const stars = starRating.querySelectorAll('.star');
        const ratingInput = document.getElementById('ratingInput');
        let rating = parseInt(ratingInput.value) || 0;

        function highlight(n) {
            stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.value) <= n));
        }

        if (rating > 0) highlight(rating);

        stars.forEach(s => {
            s.addEventListener('click', () => {
                rating = parseInt(s.dataset.value);
                ratingInput.value = rating;
                highlight(rating);
            });
            s.addEventListener('mouseenter', () => highlight(parseInt(s.dataset.value)));
        });

        starRating.addEventListener('mouseleave', () => highlight(rating));

        const form = starRating.closest('form');
        const ratingError = document.getElementById('ratingError');
        if (form) {
            form.addEventListener('submit', (e) => {
                if (parseInt(ratingInput.value) < 1) {
                    e.preventDefault();
                    if (ratingError) {
                        ratingError.style.display = 'block';
                        setTimeout(() => { ratingError.style.display = 'none'; }, 3000);
                    }
                }
            });
        }
    }
</script>
