<aside class="sidebar text-white d-flex flex-column"
       th:fragment="sidebar" xmlns:th="http://www.thymeleaf.org">

    <div class="d-flex align-items-center gap-2 mb-4 px-3">
        <i class="bi bi-book-half fs-5" style="color:#2D6A4F;"></i>
        <span class="brand fw-bold brand-text">图书管理系统</span>
    </div>

    <nav>
        <ul class="nav flex-column sidebar-menu">
            <li class="nav-item">
                <a class="nav-link" th:href="@{/home}">
                    <i class="bi bi-house"></i>
                    <span class="menu-text">首页</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/book/list}">
                    <i class="bi bi-book"></i>
                    <span class="menu-text">图书列表</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/borrow/list}">
                    <i class="bi bi-journal-text"></i>
                    <span class="menu-text">借阅记录</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/ai/chat}">
                    <i class="bi bi-robot"></i>
                    <span class="menu-text">AI 助手</span>
                </a>
            </li>
            <li class="nav-item" th:if="${session.user.role == 'admin'}">
                <a class="nav-link" th:href="@{/book/toAdd}">
                    <i class="bi bi-plus-circle"></i>
                    <span class="menu-text">添加图书</span>
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/user/change-password}">
                    <i class="bi bi-key"></i>
                    <span class="menu-text">修改密码</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="mt-auto pt-3 border-top border-light border-opacity-25 px-3">
        <small class="text-secondary brand-text" th:text="'当前：' + ${session.user.username}"></small>
    </div>
</aside>
