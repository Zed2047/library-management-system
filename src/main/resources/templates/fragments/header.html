<header class="header-bar py-3 px-3 px-md-4"
        th:fragment="header(title)">
    <div class="d-flex align-items-center justify-content-between">
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-outline-secondary d-inline-flex align-items-center"
                    type="button" id="sidebarToggle" aria-label="折叠侧边栏">
                <i class="bi bi-layout-sidebar-inset" id="sidebarToggleIcon"></i>
            </button>
            <h1 class="h5 mb-0 text-secondary" th:text="${title}"></h1>
        </div>

        <div class="d-flex align-items-center gap-3">
            <small class="text-muted" style="font-size:16px" th:text="'你好，' + ${session.user.username}"></small>
            <a th:href="@{/logout}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-box-arrow-right"></i>
                <span class="ms-1">退出</span>
            </a>
        </div>
    </div>
</header>
