<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common-head :: head('首页')}"></head>
<body class="d-flex">

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<main class="content-area flex-grow-1">
    <th:block th:replace="~{fragments/header :: header('首页')}"></th:block>

    <section class="container-fluid py-4 px-3 px-md-4">

        <div th:if="${overdueCount > 0}" class="alert alert-danger">
            ⚠ 你有 <strong th:text="${overdueCount}">0</strong> 本书已超期，请尽快归还！
        </div>
        <div th:if="${dueSoonCount > 0}" class="alert alert-warning">
            ⏰ 你有 <strong th:text="${dueSoonCount}">0</strong> 本书将在3天内到期，请及时归还！
        </div>

        <!-- 统计卡片 -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="d-flex align-items-center justify-content-center rounded-2"
                             style="width:52px;height:52px;background:#E4F4F1;">
                            <i class="bi bi-book fs-4" style="color:#2D6A4F;"></i>
                        </div>
                        <div>
                            <div class="small" style="color:#787774;">总馆藏册数</div>
                            <div class="fs-4 fw-bold" style="color:#37352F;" th:text="${totalBooks}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="d-flex align-items-center justify-content-center rounded-2"
                             style="width:52px;height:52px;background:#E4F4F1;">
                            <i class="bi bi-check-circle fs-4" style="color:#2D6A4F;"></i>
                        </div>
                        <div>
                            <div class="small" style="color:#787774;">可借册数</div>
                            <div class="fs-4 fw-bold" style="color:#2D6A4F;" th:text="${availableBooks}">0</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="d-flex align-items-center justify-content-center rounded-2"
                             style="width:52px;height:52px;background:#FFEDD5;">
                            <i class="bi bi-hourglass-split fs-4" style="color:#9C6B2D;"></i>
                        </div>
                        <div>
                            <div class="small" style="color:#787774;">借出册数</div>
                            <div class="fs-4 fw-bold" style="color:#9C6B2D;" th:text="${borrowedBooks}">0</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 最近新增 -->
        <div class="card">
            <div class="card-body">
                <h6 style="color:#787774;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:1rem;">最近新增</h6>
                <div th:if="${!#lists.isEmpty(recentBooks)}">
                    <table class="table table-borderless mb-0">
                        <thead>
                            <tr>
                                <th>书名</th>
                                <th>作者</th>
                                <th>分类</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="book : ${recentBooks}">
                                <td>
                                    <a th:href="@{/book/detail(id=${book.id})}" class="text-decoration-none fw-semibold" th:text="${book.title}"></a>
                                </td>
                                <td class="text-muted" th:text="${book.author}"></td>
                                <td class="text-muted" th:text="${book.category}"></td>
                                <td>
                                    <span th:if="${book.status == 1}" class="badge bg-success">可借</span>
                                    <span th:if="${book.status == 0}" class="badge bg-danger">已借出</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div th:if="${#lists.isEmpty(recentBooks)}" class="text-muted text-center py-3">
                    暂无图书
                </div>
            </div>
        </div>

    </section>
</main>

<th:block th:replace="~{fragments/common-scripts :: scripts}"></th:block>
</body>
</html>
